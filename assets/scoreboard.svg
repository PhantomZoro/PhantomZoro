<svg xmlns="http://www.w3.org/2000/svg" width="830" height="150" viewBox="0 0 830 150" role="img" aria-label="Scoreboard: 1.5 billion euros plus cumulative budget governed; 1,500 users across 5 countries; 70 percent faster cycles; approximately 4,700 specialist hours eliminated">
  <defs>
    <style>
      text { font-family: ui-monospace, "Cascadia Mono", "Cascadia Code", "Courier New", monospace; }
      .num { font-weight: 700; fill: #2bff88; }
      .lbl { font-size: 12.5px; fill: #a7b2c3; }
      .tag { font-size: 10px; font-weight: 700; letter-spacing: 2px; fill: #ff74c0; }
    </style>
    <pattern id="scan2" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="1" fill="#9fd6ea" opacity="0.05"/>
    </pattern>
    <filter id="ng" x="-40%" y="-60%" width="180%" height="220%">
      <feGaussianBlur stdDeviation="2.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="1.5" y="1.5" width="827" height="147" rx="7" fill="#10131a"/>
  <rect x="1.5" y="1.5" width="827" height="147" rx="7" fill="url(#scan2)"/>
  <rect x="1.5" y="1.5" width="827" height="147" rx="7" fill="none" stroke="#2bff88" stroke-opacity="0.32" stroke-width="1.5"/>

  <!-- top strip label -->
  <text x="24" y="27" font-size="11" font-weight="700" letter-spacing="3" fill="#808c9f">// HIGH SCORES</text>
  <text x="806" y="27" text-anchor="end" font-size="11" letter-spacing="2" fill="#808c9f">SHIPPED SOLO</text>
  <line x1="20" y1="40" x2="810" y2="40" stroke="#9fd6ea" stroke-opacity="0.1"/>

  <!-- dividers -->
  <line x1="207.5" y1="52" x2="207.5" y2="132" stroke="#9fd6ea" stroke-opacity="0.12"/>
  <line x1="415" y1="52" x2="415" y2="132" stroke="#9fd6ea" stroke-opacity="0.12"/>
  <line x1="622.5" y1="52" x2="622.5" y2="132" stroke="#9fd6ea" stroke-opacity="0.12"/>

  <!-- cell 1 -->
  <g text-anchor="middle">
    <text x="104" y="90" font-size="34" class="num" filter="url(#ng)">&#8364;1.5B+</text>
    <text x="104" y="111" class="lbl">cumulative budget governed</text>
    <text x="104" y="128" class="tag">ABACS</text>
  </g>
  <!-- cell 2 -->
  <g text-anchor="middle">
    <text x="311" y="90" font-size="34" class="num" filter="url(#ng)">1,500</text>
    <text x="311" y="111" class="lbl">users&#160;&#183;&#160;5 countries</text>
    <text x="311" y="128" class="tag">ABACS</text>
  </g>
  <!-- cell 3 -->
  <g text-anchor="middle">
    <text x="518.5" y="90" font-size="34" class="num" filter="url(#ng)">70%</text>
    <text x="518.5" y="111" class="lbl">faster allocation cycles</text>
    <text x="518.5" y="128" class="tag">ABACS</text>
  </g>
  <!-- cell 4 -->
  <g text-anchor="middle">
    <text x="726" y="90" font-size="34" class="num" filter="url(#ng)">&#8776;4,700</text>
    <text x="726" y="111" class="lbl">specialist hrs eliminated</text>
    <text x="726" y="128" class="tag">ECM</text>
  </g>
</svg>
