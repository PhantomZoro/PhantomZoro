<svg xmlns="http://www.w3.org/2000/svg" width="830" height="118" viewBox="0 0 830 118" role="img" aria-label="Now building — KodeRyu: AI voice interviewer, launching soon">
  <defs>
    <style>
      text { font-family: ui-monospace, "Cascadia Mono", "Cascadia Code", "Courier New", monospace; }
    </style>
    <radialGradient id="gGlow" cx="16%" cy="50%" r="80%">
      <stop offset="0" stop-color="#2bff88" stop-opacity="0.22"/>
      <stop offset="45%" stop-color="#2bff88" stop-opacity="0.05"/>
      <stop offset="72%" stop-color="#2bff88" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mGlow" cx="90%" cy="50%" r="75%">
      <stop offset="0" stop-color="#ff3ea5" stop-opacity="0.22"/>
      <stop offset="45%" stop-color="#ff3ea5" stop-opacity="0.06"/>
      <stop offset="72%" stop-color="#ff3ea5" stop-opacity="0"/>
    </radialGradient>
    <pattern id="scan3" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="1" fill="#9fd6ea" opacity="0.05"/>
    </pattern>
    <filter id="gk" x="-30%" y="-60%" width="160%" height="220%">
      <feGaussianBlur stdDeviation="3.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="mk" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="1" y="1.5" width="828" height="115" rx="7" fill="#07090d"/>
  <rect x="1" y="1.5" width="828" height="115" rx="7" fill="url(#gGlow)"/>
  <rect x="1" y="1.5" width="828" height="115" rx="7" fill="url(#mGlow)"/>
  <rect x="1" y="1.5" width="828" height="115" rx="7" fill="url(#scan3)"/>
  <rect x="1" y="1.5" width="828" height="115" rx="7" fill="none" stroke="#2bff88" stroke-opacity="0.42" stroke-width="1.5"/>

  <!-- boss badge -->
  <g transform="translate(28,30)">
    <rect x="0" y="-14" width="176" height="24" rx="4" fill="#ff3ea5" fill-opacity="0.12" stroke="#ff3ea5" stroke-opacity="0.5"/>
    <circle cx="16" cy="-2" r="4.5" fill="#ff3ea5" filter="url(#mk)">
      <animate attributeName="opacity" values="1;0.45;1" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <text x="30" y="2.5" font-size="11.5" font-weight="700" letter-spacing="2.5" fill="#ff74c0">NOW BUILDING</text>
  </g>
  <text x="802" y="34" text-anchor="end" font-size="11" font-weight="700" letter-spacing="2.5" fill="#ff74c0" opacity="0.75">BOSS LV</text>

  <!-- title -->
  <text x="28" y="82" font-size="38" font-weight="700" letter-spacing="2" fill="#8dffc0" filter="url(#gk)">KODERYU</text>

  <!-- subtitle -->
  <text x="252" y="78" font-size="14.5" font-weight="600" letter-spacing="2.5" fill="#e8ecf1">AI VOICE INTERVIEWER
    <tspan fill="#ff74c0"> · </tspan><tspan fill="#a7b2c3">LAUNCHING SOON</tspan></text>
  <text x="252" y="98" font-size="12" letter-spacing="1" fill="#808c9f">koderyu.com</text>
</svg>
